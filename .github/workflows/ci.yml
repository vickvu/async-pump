name: CI
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
permissions:
    contents: read
jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node-version: [20, 22, 24]
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Setup Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'
            - name: Install NPM packages
              run: npm ci
            - name: Build
              run: npm run build
            - name: Test (prettier + typecheck + coverage)
              run: npm test
